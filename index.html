<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Father's Day! ✨</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --accent-cyan: #00f2fe;
            --accent-purple: #4facfe;
            --text-color: #f5f6fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* The Main Digital Card Container */
        .card {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        /* Smooth page transition wrapper */
        .page-content {
            display: none;
            animation: scaleUp 0.4s ease-out forwards;
            min-height: 220px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .page-content.active {
            display: flex;
        }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Trendy Visual Elements */
        .icon-circle {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        p {
            color: #a0aec0;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        /* Highlighted Key Text */
        .highlight {
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        /* Slick Navigation Button */
        .next-btn {
            margin-top: 35px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.3);
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .next-btn:active {
            transform: scale(0.96);
            box-shadow: 0 4px 10px rgba(0, 242, 254, 0.2);
        }

        /* Floating Confetti / Emoji Effect */
        .emoji-pop {
            position: fixed;
            pointer-events: none;
            font-size: 2rem;
            z-index: 10;
            animation: flyUp 1.5s ease-out forwards;
        }

        @keyframes flyUp {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        
        <!-- PAGE 1: THE WELCOME -->
        <div class="page-content active" id="page1">
            <div class="icon-circle">⚡</div>
            <h1>Hey Dad,<br>Open This!</h1>
            <p> Tap below to begin.</p>
            <button class="next-btn" onclick="popEmojis(event); goToPage(2)">Next Page →</button>
        </div>

        <!-- PAGE 2: THE REASON -->
        <div class="page-content" id="page2">
            <div class="icon-circle">💝</div>
            <h1>A Big<span class="highlight"> THANKS</span></h1>
            <p>Thank You for being my best supporter. Thank You for trusting me everytime. Thank You for solving all my problems.</p>
            <button class="next-btn" onclick="popEmojis(event); goToPage(3)">Next Page →</button>
        </div>

        <!-- PAGE 3: THE HEARTFELT WISH -->
        <div class="page-content" id="page3">
            <div class="icon-circle">❤️</div>
            <h1>Happy<br><span class="highlight">Father's Day</span></h1>
            <p> I always loved you. You're the real legend!</p>
            <button class="next-btn" onclick="popEmojis(event); goToPage(1)">Start Over 🔄</button>
        </div>

    </div>

    <script>
        // Simple Page Switching Engine
        function goToPage(pageNumber) {
            // Hide all pages
            document.querySelectorAll('.page-content').forEach(page => {
                page.classList.remove('active');
            });
            // Show selected page
            document.getElementById('page' + pageNumber).classList.add('active');
        }

        // Clean, Fun Mobile Tap Interaction
        function popEmojis(e) {
            const sparkles = ['✨', '🔥', '👑', '💙', '🎉'];
            
            // Handle both touch events on phone and clicks on PC
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);

            for (let i = 0; i < 6; i++) {
                const element = document.createElement('span');
                element.className = 'emoji-pop';
                element.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
                
                // Position right where the finger taps
                element.style.left = (x - 15) + 'px';
                element.style.top = (y - 15) + 'px';
                
                // Add a random slight left/right drift
                element.style.marginLeft = (Math.random() * 40 - 20) + 'px';

                document.body.appendChild(element);
                
                // Clear from phone's memory after animation finishes
                setTimeout(() => element.remove(), 1500);
            }
        }
    </script>
</body>
</html>
